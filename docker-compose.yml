# GPU passthrough requires the NVIDIA Container Toolkit:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# To run without a GPU, remove the entire `deploy` block from the api service
# and add the environment variable DEVICE=cpu.
#
# If the api container exits with code 137, Docker killed it for exceeding the
# memory limit. Increase Docker Desktop memory in Settings -> Resources -> Memory.
# 6 GB is recommended (ResNet50 + LSTM + decoded video frames in RAM).

services:

  api:
    build: .
    container_name: surveillance-api
    ports:
      - "8000:8000"
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: on-failure

  ui:
    build: .
    container_name: surveillance-ui
    ports:
      - "8501:8501"
    command: >
      python -m streamlit run ui/app.py
      --server.port 8501
      --server.headless true
      --server.address 0.0.0.0
    environment:
      # Inside the Docker network the API is reachable via the service name.
      # This overrides the localhost default in ui/app.py.
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure
