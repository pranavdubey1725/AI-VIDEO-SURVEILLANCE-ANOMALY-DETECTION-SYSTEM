# CPU-only variant — no NVIDIA GPU or Container Toolkit required.
# Use this if you don't have a GPU:
#   docker compose -f docker-compose.cpu.yml up --build

services:

  api:
    build: .
    container_name: surveillance-api
    ports:
      - "8000:8000"
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: on-failure

  ui:
    build: .
    container_name: surveillance-ui
    ports:
      - "8501:8501"
    command: >
      python -m streamlit run ui/app.py
      --server.port 8501
      --server.headless true
      --server.address 0.0.0.0
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure
